<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DeepEmbryo{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">DeepEmbryo</a>
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Tahmin</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('history') }}">Geçmiş</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('export_csv') }}">CSV</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('export_pdf') }}">PDF</a></li>
    </ul>
  </div>
</nav>
<main class="container my-4">
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}
      <div class="alert alert-warning">{{ m }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
